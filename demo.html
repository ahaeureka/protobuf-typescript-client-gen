<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stew Auth Client Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-label {
            color: #666;
            font-weight: 500;
        }

        .status-value {
            color: #333;
            font-weight: 600;
        }

        .status-value.success {
            color: #10b981;
        }

        .status-value.error {
            color: #ef4444;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .log {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 5px;
            word-break: break-all;
        }

        .log-entry.info {
            color: #60a5fa;
        }

        .log-entry.success {
            color: #34d399;
        }

        .log-entry.error {
            color: #f87171;
        }

        .log-entry.warn {
            color: #fbbf24;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
            color: #1e40af;
        }

        .info-box h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-box code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 Stew Auth Client Demo</h1>
        <p class="subtitle">OIDC 认证流程演示</p>

        <!-- 认证状态 -->
        <div class="status">
            <div class="status-item">
                <span class="status-label">认证状态:</span>
                <span class="status-value" id="auth-status">未登录</span>
            </div>
            <div class="status-item">
                <span class="status-label">Token 状态:</span>
                <span class="status-value" id="token-status">无效</span>
            </div>
            <div class="status-item">
                <span class="status-label">Token:</span>
                <span class="status-value" id="token-value" style="font-size: 10px; word-break: break-all;">-</span>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="button-group">
            <button class="btn-primary" onclick="handleLogin()">登录</button>
            <button class="btn-danger" onclick="handleLogout()">登出</button>
        </div>

        <div class="button-group">
            <button class="btn-success" onclick="handleCallback()">处理回调</button>
            <button class="btn-secondary" onclick="loadUserInfo()">获取用户信息</button>
        </div>

        <div class="button-group">
            <button class="btn-secondary" onclick="checkStatus()">刷新状态</button>
            <button class="btn-secondary" onclick="clearLogs()">清空日志</button>
        </div>

        <!-- 日志输出 -->
        <div class="log" id="log-container">
            <div class="log-entry info">等待操作...</div>
        </div>

        <!-- 使用说明 -->
        <div class="info-box">
            <h3>📖 使用说明</h3>
            <p>1. 点击 <code>登录</code> 按钮，将重定向到 OIDC provider</p>
            <p>2. 登录成功后会重定向回 callback 页面</p>
            <p>3. 在 callback 页面点击 <code>处理回调</code> 提取 token</p>
            <p>4. 使用 <code>获取用户信息</code> 测试认证接口</p>
            <p>5. 点击 <code>登出</code> 清除认证并登出</p>
        </div>
    </div>

    <script type="module">
        // 注意：这是一个演示页面，实际使用时需要导入正确的模块
        // import AuthServiceClient from './auth_client';

        // 模拟客户端（实际使用时替换为真实导入）
        class AuthServiceClient {
            constructor(gwBaseUrl, loginCallbackUrl, logoutCallbackUrl) {
                this.gwBaseUrl = gwBaseUrl;
                this.loginCallbackUrl = loginCallbackUrl;
                this.logoutCallbackUrl = logoutCallbackUrl;
            }

            async login() {
                const loginUrl = `${this.gwBaseUrl}/auth/login?callback=${encodeURIComponent(this.loginCallbackUrl)}`;
                window.location.href = loginUrl;
            }

            handleLoginCallback() {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const token = urlParams.get('token');

                if (code === 'success' && token) {
                    this.saveToken(token);
                    return { success: true, token };
                } else {
                    const error = urlParams.get('error') || 'Unknown error';
                    return { success: false, error };
                }
            }

            async logout() {
                const token = this.getToken();
                if (!token) {
                    this.clearLocalAuth();
                    window.location.href = this.logoutCallbackUrl;
                    return;
                }

                const logoutUrl = `${this.gwBaseUrl}/auth/logout?callback=${encodeURIComponent(this.logoutCallbackUrl)}&token=${encodeURIComponent(token)}`;
                this.clearLocalAuth();
                window.location.href = logoutUrl;
            }

            saveToken(token) {
                localStorage.setItem('token', token);
                const expires = new Date();
                expires.setTime(expires.getTime() + 24 * 60 * 60 * 1000);
                document.cookie = `token=${encodeURIComponent(token)};expires=${expires.toUTCString()};path=/;SameSite=Lax`;
            }

            getToken() {
                return localStorage.getItem('token') || null;
            }

            isAuthenticated() {
                return this.getToken() !== null;
            }

            isTokenValid() {
                const token = this.getToken();
                if (!token) return false;

                try {
                    const parts = token.split('.');
                    if (parts.length !== 3) return false;

                    const payload = JSON.parse(atob(parts[1]));
                    if (payload.exp) {
                        const now = Math.floor(Date.now() / 1000);
                        return payload.exp > now;
                    }
                    return true;
                } catch {
                    return false;
                }
            }

            clearLocalAuth() {
                localStorage.removeItem('token');
                document.cookie = 'token=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
            }

            async getUserInfo() {
                const token = this.getToken();
                if (!token) throw new Error('No token');

                const response = await fetch(`${this.gwBaseUrl}/auth/user`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                return response.json();
            }
        }

        // 初始化客户端
        window.authClient = new AuthServiceClient(
            'http://localhost:3012',
            window.location.origin + '/callback.html',
            window.location.origin
        );

        // 日志函数
        function log(message, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // 更新状态显示
        function updateStatus() {
            const authStatus = document.getElementById('auth-status');
            const tokenStatus = document.getElementById('token-status');
            const tokenValue = document.getElementById('token-value');

            const isAuth = window.authClient.isAuthenticated();
            const isValid = window.authClient.isTokenValid();
            const token = window.authClient.getToken();

            authStatus.textContent = isAuth ? '已登录' : '未登录';
            authStatus.className = isAuth ? 'status-value success' : 'status-value error';

            tokenStatus.textContent = isValid ? '有效' : '无效';
            tokenStatus.className = isValid ? 'status-value success' : 'status-value error';

            tokenValue.textContent = token ? token.substring(0, 50) + '...' : '-';
        }

        // 全局函数
        window.handleLogin = async function () {
            try {
                log('发起登录请求...', 'info');
                await window.authClient.login();
            } catch (error) {
                log(`登录失败: ${error.message}`, 'error');
            }
        };

        window.handleCallback = function () {
            try {
                log('处理登录回调...', 'info');
                const result = window.authClient.handleLoginCallback();

                if (result.success) {
                    log('✓ 登录成功！Token 已保存', 'success');
                    log(`Token: ${result.token.substring(0, 50)}...`, 'info');
                    updateStatus();
                } else {
                    log(`✗ 登录失败: ${result.error}`, 'error');
                }
            } catch (error) {
                log(`处理回调失败: ${error.message}`, 'error');
            }
        };

        window.handleLogout = async function () {
            try {
                log('发起登出请求...', 'info');
                await window.authClient.logout();
            } catch (error) {
                log(`登出失败: ${error.message}`, 'error');
                updateStatus();
            }
        };

        window.loadUserInfo = async function () {
            try {
                log('获取用户信息...', 'info');
                const user = await window.authClient.getUserInfo();
                log('✓ 用户信息获取成功:', 'success');
                log(JSON.stringify(user, null, 2), 'info');
            } catch (error) {
                log(`✗ 获取用户信息失败: ${error.message}`, 'error');

                if (error.message.includes('401')) {
                    log('Token 可能已过期，请重新登录', 'warn');
                }
            }
        };

        window.checkStatus = function () {
            log('刷新认证状态...', 'info');
            updateStatus();

            const isAuth = window.authClient.isAuthenticated();
            const isValid = window.authClient.isTokenValid();

            log(`认证状态: ${isAuth ? '已登录' : '未登录'}`, isAuth ? 'success' : 'error');
            log(`Token 状态: ${isValid ? '有效' : '无效'}`, isValid ? 'success' : 'error');
        };

        window.clearLogs = function () {
            const container = document.getElementById('log-container');
            container.innerHTML = '<div class="log-entry info">日志已清空</div>';
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            log('AuthServiceClient Demo 已加载', 'success');
            log(`Gateway URL: http://localhost:3012`, 'info');
            log(`Callback URL: ${window.location.origin}/callback.html`, 'info');
            updateStatus();

            // 检查是否是回调页面
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('code') || urlParams.has('token')) {
                log('检测到回调参数，自动处理...', 'warn');
                setTimeout(() => window.handleCallback(), 500);
            }
        });
    </script>
</body>

</html>
